    <!-- 자바스크립트 정밀 데이터 구조 -->
    <script>
        // ==========================================================
        // [OOP 요구사항] 다형성 구현을 위한 클래스 계층 설계 영역
        // ==========================================================
        class WesterosNode {
            constructor(name) { this.name = name; }
            calculateMobilization() { return `기본 군사령이 선포되었습니다.`; }
        }
        class StarkHouse extends WesterosNode {
            calculateMobilization() {
                return Math.random() > 0.5 
                    ? `- 혹독한 한파로 수송 제한. 징집병 15,000명 소집 (평시 대비 50% 감소).` 
                    : `- 북부 영주들의 결집 완료. 정예 북부군 30,000명 소집 완료.`;
            }
        }
        class TullyHouse extends WesterosNode {
            calculateMobilization() {
                return Math.random() > 0.4
                    ? `- 삼면강 평야 지대의 풍부한 곡창 기반 확충! 군량 자원 8,000석 및 보급마차 선제 고정 확보.`
                    : `- 리버랜드 사방 평야 지대의 지리적 노출로 인해, 방어 군량 분산 배치령 하달.`;
            }
        }
        class LannisterHouse extends WesterosNode {
            calculateMobilization() { return `- 서부 캐스터리 록 금광에서 자금 5,000 드래곤 금화 고정 확충. (상비군 35,000명)`; }
        }
        class TargaryenHouse extends WesterosNode {
            calculateMobilization() { return `- 전설적인 드래곤 "발레리온"의 화력 측정 완료. 공성 전투력 공정 고정치 +9,999 포인트 가산.`; }
        }
        class GreyjoyHouse extends WesterosNode {
            calculateMobilization() {
                return Math.random() > 0.4 
                    ? `- 리버랜드 연안 기습 성공! 군자금 +1,500 및 군량 자원 약탈.` 
                    : `- 관군의 강력한 해안 방어선에 가로막혀 수확 없이 회군.`;
            }
        }
        class TyrellHouse extends WesterosNode {
            calculateMobilization() { return `- 하이 가든의 비옥한 영지에서 보급식량 10,000 가마 고정 보급 완료.`; }
        }
        class BaratheonHouse extends WesterosNode {
            calculateMobilization() {
                return Math.random() > 0.5

            BeyondWall: { 
                type: "독립 세력", title: "와일들링 (자유민)", motto: "\"우리는 무릎 꿇지 않는다\"", 
                desc: "장벽 이북의 혹독한 동토지대에서 부족을 이루어 살아가는 원시 자유민 집단입니다. 철왕좌의 영주제 법률을 전면 거부하며 생존을 위해 장벽 남쪽 가문들을 상시 약탈합니다.", 
                leader: "만스 레이더 (Mance Rayder)", leaderDesc: "과거 밤의 경비대 정찰대원이었으나 탈영한 후, 분열되어 있던 수백 개의 야인 부족들을 오직 비전과 리더십으로 통합해 '장벽 너머의 왕'으로 추대받은 지략가입니다."
            }
        };

        let currentActiveKey = null;

        function viewDetails(key) {
            const data = hierarchyData[key];
            if (!data) return;

            // 1. 기존 액티브 클래스 제거 및 신규 지정
            if (currentActiveKey) {
                const prevEl = document.getElementById(`node-${currentActiveKey}`);
                if (prevEl) prevEl.classList.remove('active-card');
            }
            currentActiveKey = key;
            const currentEl = document.getElementById(`node-${key}`);
            if (currentEl) currentEl.classList.add('active-card');

            // 2. 화면 데이터 바인딩
            document.getElementById('monitor-empty').classList.add('hidden');
            const contentEl = document.getElementById('monitor-content');
            contentEl.classList.remove('hidden');

            const typeEl = document.getElementById('m-type');
            typeEl.innerText = data.type;
            
            if (data.type.includes("봉신")) {
                typeEl.className = "text-[10px] font-bold px-2 py-0.5 rounded uppercase tracking-wide bg-amber-500 text-slate-950 border border-amber-400 font-black";
            } else if (data.type.includes("대가문") || data.type.includes("왕가")) {
                typeEl.className = "text-[10px] font-bold px-2 py-0.5 rounded uppercase tracking-wide bg-amber-950/80 text-amber-400 border border-amber-800";
            } else if (data.type.includes("독립") || data.type.includes("특수")) {
                typeEl.className = "text-[10px] font-bold px-2 py-0.5 rounded uppercase tracking-wide bg-red-950 text-red-400 border border-red-800";
            } else {
                typeEl.className = "text-[10px] font-bold px-2 py-0.5 rounded uppercase tracking-wide bg-indigo-950/80 text-indigo-400 border border-indigo-900";
            }

            document.getElementById('m-title').innerText = data.title;
            document.getElementById('m-motto').innerText = data.motto;
            document.getElementById('m-desc').innerText = data.desc;
            document.getElementById('m-leader').innerText = data.leader;
            document.getElementById('m-leader-desc').innerText = data.leaderDesc;

            // 3. 인스턴스를 만들고 오버라이딩된 다형성 계산 메서드 실행
            const factionInstance = getFactionInstance(key, data.title);
            const mobilizationResult = factionInstance.calculateMobilization();

            // 4. 터미널 콘솔 로그 출력 (원래 텍스트 갱신)
            const consoleEl = document.getElementById('console-log');
            consoleEl.innerHTML = `&gt; 병력 소집 명령: ${mobilizationResult}`;
        }
    </script>
</body>
</html>
