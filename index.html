            // --- 2.1.10 특수 클래스 및 독립 세력 데이터 ---
            NightWatch: {
                type: "특수 군단", title: "밤의 경비대 (Night's Watch)", motto: "\"내 초소는 장벽이며, 나는 어둠을 밝히는 불꽃이다\"",
                desc: "웨스테로스 최북단의 고대 거대 건축물 '장벽(The Wall)'을 영구히 수호하는 독립 군사 집단입니다. 칠왕국의 정치 싸움에 절대 개입하지 않으며, 오직 장벽 너머의 고대 위협으로부터 대륙 전체의 인류를 보호하는 성스러운 서약을 이행합니다.",
                leader: "존 스노우 (Jon Snow)", leaderDesc: "에다드 스타크의 서자 출신. 서약 형제로 입대하여 뛰어난 검술과 리더십을 발휘, 다가올 겨울의 진정한 위협에 대비해 장벽을 사수하는 핵심 지휘관입니다."
            },
            BeyondWall: {
                type: "2.1.10 독립 세력", title: "장벽 너머 (Beyond the Wall)", motto: "\"우리는 무릎 꿇지 않는 자유민 (Free Folk)\"",
                desc: "웨스테로스 최북단 고대 장벽 너머의 혹독한 동토 지대에 살아가는 부족 연합체입니다. 칠왕국의 왕권 체제와 규율을 전면 거부하고 스스로를 '자유민'이라 부르며, 생존을 위해 장벽을 넘어 대륙 남침을 도모합니다.",
                leader: "만스 레이더 (Mance Rayder)", leaderDesc: "'장벽 너머의 왕'으로 불리는 인물. 본래 밤의 경비대 출신이었으나 탈영 후 흩어져 싸우던 수십 개의 와일들링 부족들을 압도적인 카리스마와 지략으로 하나로 통합해낸 위대한 지도자입니다."
            }
        };

        function viewDetails(key) {
            const data = hierarchyData[key];
            if (!data) return;

            // 1. 활성화 노드 하이라이트 효과 전환
            document.querySelectorAll('[id^="node-"]').forEach(el => {
                el.classList.remove('active-card');
            });
            const targetNode = document.getElementById(`node-${key}`);
            if (targetNode) targetNode.classList.add('active-card');

            // 2. 우측 디테일 정보 패널 매핑
            document.getElementById('monitor-empty').classList.add('hidden');
            const content = document.getElementById('monitor-content');
            content.classList.remove('hidden');

            const typeEl = document.getElementById('m-type');
            typeEl.innerText = data.type;
            
            // 배지 색상 동적 튜닝
            if (data.type.includes("대가문") || data.type.includes("왕가")) {
                typeEl.className = "text-[10px] font-bold px-2 py-0.5 rounded uppercase tracking-wide bg-amber-950/80 text-amber-400 border border-amber-800";
            } else if (data.type.includes("독립") || data.type.includes("특수")) {
                typeEl.className = "text-[10px] font-bold px-2 py-0.5 rounded uppercase tracking-wide bg-red-950 text-red-400 border border-red-800";
            } else {
                typeEl.className = "text-[10px] font-bold px-2 py-0.5 rounded uppercase tracking-wide bg-indigo-950/80 text-indigo-400 border border-indigo-900";
            }

            document.getElementById('m-title').innerText = data.title;
            document.getElementById('m-motto').innerText = data.motto;
            document.getElementById('m-desc').innerText = data.desc;
            document.getElementById('m-leader').innerText = data.leader;
            document.getElementById('m-leader-desc').innerText = data.leaderDesc;

            // 3. 하단 시스템 로그 갱신
            const consoleLog = document.getElementById('console-log');
            const timestamp = new Date().toLocaleTimeString();
            consoleLog.innerHTML = `> [${timestamp}] 계층 노드 탐색 완료: [${data.title}]<br>> 고증 클래스 구조 상속 데이터 연동 정상.`;
        }
    </script>
</body>
</html>
