<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>웨스테로스 세력 및 봉신 가문 계층도</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @keyframes pulse-glow {
            0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(217, 119, 6, 0.7); }
            50% { transform: scale(1.01); box-shadow: 0 0 15px 5px rgba(217, 119, 6, 0.4); }
        }
        .active-card {
            animation: pulse-glow 1.5s infinite ease-in-out;
            background-color: rgb(15, 23, 42) !important;
            border-color: rgb(217, 119, 6) !important;
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen font-sans flex flex-col justify-between">

    <!-- 상단 헤더 -->
    <header class="bg-slate-900 border-b border-slate-800 p-6 text-center shadow-lg">
        <h1 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-amber-400 via-yellow-500 to-orange-500">
            웨스테로스 세력 및 봉신 가문 계층도
        </h1>
        <p class="text-slate-400 mt-2 text-sm">얼음과 불의 노래 공식 고증 가계도형 세력 구조 매핑 시스템</p>
    </header>

    <!-- 메인 컨텐츠 영역 -->
    <main class="max-w-7xl w-full mx-auto p-6 grid grid-cols-1 lg:grid-cols-4 gap-8 items-start my-auto">
        
        <!-- 왼쪽: 실선 구조의 가계도 트리 (3컬럼 차지) -->
        <div class="lg:col-span-3 bg-slate-900/60 border border-slate-800 rounded-2xl p-6 shadow-2xl">
            <h2 class="text-xl font-bold mb-6 flex items-center gap-2 text-amber-400">
                <span>👑</span> Westeros Hierarchy Tree (가문-봉신 연동 트리)
            </h2>
            
            <div class="flex flex-col items-center">
                
                <!-- [최상위 부모] 웨스테로스 대륙 -->
                <div class="bg-slate-800 border-2 border-slate-600 rounded-xl p-4 w-64 text-center shadow-xl z-10">
                    <div class="text-[10px] uppercase font-bold text-slate-400 tracking-wider mb-1">Root Continent</div>
                    <div class="text-xl font-black text-amber-400">웨스테로스 대륙</div>
                </div>

                <!-- 부모 -> 대가문 리스트 수직 연결선 -->
                <div class="w-0.5 h-6 bg-slate-700"></div>

                <!-- 대가문 및 독립세력 가로 나열 그리드 -->
                <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-6 w-full pt-2 border-t border-slate-800">
                    
                    <!-- 1. 북부 스타크 세력 -->
                    <div class="bg-slate-900/40 p-3 rounded-xl border border-slate-800/80">
                        <button onclick="viewDetails('Stark')" id="node-Stark"
                            class="w-full bg-slate-900 border border-slate-700 hover:border-amber-500 rounded-lg p-2.5 text-left transition-all cursor-pointer">
                            <span class="text-sm font-bold text-blue-400 block">🛡️ 북부</span>
                            <span class="text-base font-black text-slate-200">스타크 가문</span>
                        </button>
                        <!-- 봉신 가문 가계도 선 연결 구조 -->
                        <div class="mt-2 pl-3 border-l-2 border-slate-700 space-y-1.5 text-left">
                            <button onclick="viewDetails('Mormont')" id="node-Mormont" class="text-xs text-slate-400 hover:text-amber-400 block cursor-pointer py-0.5">├─ 🐻 모르몬트 가문</button>
                            <button onclick="viewDetails('Karstark')" id="node-Karstark" class="text-xs text-slate-400 hover:text-amber-400 block cursor-pointer py-0.5">├─ ☀️ 카스타크 가문</button>
                            <button onclick="viewDetails('Bolton')" id="node-Bolton" class="text-xs text-slate-400 hover:text-amber-400 block cursor-pointer py-0.5">└─ 🩸 볼튼 가문</button>
                        </div>
                    </div>

                    <!-- 2. 서부 라니스터 세력 -->
                    <div class="bg-slate-900/40 p-3 rounded-xl border border-slate-800/80">
                        <button onclick="viewDetails('Lannister')" id="node-Lannister"
                            class="w-full bg-slate-900 border border-slate-700 hover:border-amber-500 rounded-lg p-2.5 text-left transition-all cursor-pointer">
                            <span class="text-sm font-bold text-amber-500 block">🦁 웨스터랜드</span>
                            <span class="text-base font-black text-slate-200">라니스터 가문</span>
                        </button>
                        <div class="mt-2 pl-3 border-l-2 border-slate-700 space-y-1.5 text-left">
                            <button onclick="viewDetails('Crakehall')" id="node-Crakehall" class="text-xs text-slate-400 hover:text-amber-400 block cursor-pointer py-0.5">├─ 🐗 크레이크홀 가문</button>
                            <button onclick="viewDetails('Marbrand')" id="node-Marbrand" class="text-xs text-slate-400 hover:text-amber-400 block cursor-pointer py-0.5">├─ 🔥 마르브랜드 가문</button>
                            <button onclick="viewDetails('Clegane')" id="node-Clegane" class="text-xs text-slate-400 hover:text-amber-400 block cursor-pointer py-0.5">└─ 🐕 클레가인 가문</button>
                        </div>
                    </div>

                    <!-- 3. 리버랜드 툴리 세력 -->
                    <div class="bg-slate-900/40 p-3 rounded-xl border border-slate-800/80">
                        <button onclick="viewDetails('Tully')" id="node-Tully"
                            class="w-full bg-slate-900 border border-slate-700 hover:border-amber-500 rounded-lg p-2.5 text-left transition-all cursor-pointer">
                            <span class="text-sm font-bold text-teal-400 block">🐟 리버랜드</span>
                            <span class="text-base font-black text-slate-200">툴리 가문</span>
                        </button>
                        <div class="mt-2 pl-3 border-l-2 border-slate-700 space-y-1.5 text-left">
                            <button onclick="viewDetails('Mallister')" id="node-Mallister" class="text-xs text-slate-400 hover:text-amber-400 block cursor-pointer py-0.5">├─ 🦅 말리스터 가문</button>
                            <button onclick="viewDetails('Blackwood')" id="node-Blackwood" class="text-xs text-slate-400 hover:text-amber-400 block cursor-pointer py-0.5">├─ 🐦 블랙우드 가문</button>
                            <button onclick="viewDetails('Frey')" id="node-Frey" class="text-xs text-slate-400 hover:text-amber-400 block cursor-pointer py-0.5">└─ 🏰 프레이 가문</button>
                        </div>
                    </div>

                    <!-- 4. 국왕령 및 독립 단체 (밤의 경비대 포함) -->
                    <div class="bg-slate-900/40 p-3 rounded-xl border border-slate-800/80 space-y-4">
                        <!-- 국왕령 타르가르옌 -->
                        <div>
                            <button onclick="viewDetails('Targaryen')" id="node-Targaryen"
                                class="w-full bg-slate-900 border border-slate-700 hover:border-amber-500 rounded-lg p-2.5 text-left transition-all cursor-pointer">
                                <span class="text-sm font-bold text-red-500 block">🐉 국왕령 (드래곤스톤)</span>
                                <span class="text-base font-black text-slate-200">타르가르옌 가문</span>
                            </button>
                            <div class="mt-1 pl-3 border-l-2 border-slate-700 text-left">
                                <button onclick="viewDetails('Velaryon')" id="node-Velaryon" class="text-xs text-slate-400 hover:text-amber-400 block cursor-pointer py-0.5">└─ ⚓ 벨라리온 가문</button>
                            </div>
                        </div>

                        <!-- 독립 특수 세력: 밤의 경비대 -->
                        <div class="border-t border-slate-800 pt-3">
                            <button onclick="viewDetails('NightWatch')" id="node-NightWatch"
                                class="w-full bg-slate-950 border-2 border-dashed border-slate-700 hover:border-slate-400 rounded-lg p-2.5 text-left transition-all cursor-pointer">
                                <span class="text-sm font-bold text-slate-400 block">❄️ 장벽 방어 군단</span>
                                <span class="text-base font-black text-slate-100 flex items-center gap-1">밤의 경비대 <span class="text-xs font-normal text-slate-500">(Night's Watch)</span></span>
                            </button>
                        </div>
                    </div>

                </div>
            </div>
        </div>

        <!-- 오른쪽: 계층 구조 상세 정보 뷰어 (1컬럼 차지) -->
        <div class="bg-slate-900 border border-slate-800 rounded-2xl p-5 shadow-2xl flex flex-col h-[520px]">
            <h2 class="text-lg font-bold mb-3 flex items-center gap-2 text-amber-500">
                <span>⚔️</span> Lineage Detail View
            </h2>
            
            <div id="monitor-view" class="bg-slate-950 rounded-xl p-4 flex-1 border border-slate-950 flex flex-col justify-start overflow-y-auto text-left">
                <!-- 대기 화면 -->
                <div id="monitor-empty" class="h-full flex flex-col justify-center items-center text-center text-slate-600">
                    <div class="text-4xl mb-2">🏰</div>
                    <div class="text-sm font-semibold">세력 또는 가문 선택</div>
                    <div class="text-xs text-slate-500 mt-1">좌측 계층 트리의 가문 및 봉신을 클릭하면 상세 설명과 대표자가 출력됩니다.</div>
                </div>
                
                <!-- 상세 내용 바인딩 패널 -->
                <div id="monitor-content" class="hidden space-y-4">
                    <div>
                        <span id="m-type" class="text-[10px] font-bold px-2 py-0.5 rounded uppercase tracking-wide"></span>
                        <h3 id="m-title" class="text-xl font-extrabold text-slate-100 mt-1.5"></h3>
                        <p id="m-motto" class="text-xs text-yellow-400 font-serif italic mt-1"></p>
                    </div>

                    <div class="bg-slate-900 p-3 rounded-lg border border-slate-800">
                        <div class="text-xs font-bold text-slate-400 mb-1">🏰 세력 소개 및 역할</div>
                        <p id="m-desc" class="text-xs text-slate-300 leading-relaxed"></p>
                    </div>

                    <div class="bg-slate-900 p-3 rounded-lg border border-slate-800">
                        <div class="text-xs font-bold text-emerald-400 mb-1">👤 대표자 / 주요 인물</div>
                        <div id="m-leader" class="text-sm font-bold text-slate-200"></div>
                        <p id="m-leader-desc" class="text-xs text-slate-400 mt-1 leading-relaxed"></p>
                    </div>
                </div>
            </div>

            <!-- 하단 로그 기록기 -->
            <div class="mt-3">
                <div id="console-log" class="bg-black/40 border border-slate-950 rounded-lg p-2 font-mono text-[10px] text-green-400 h-16 overflow-y-auto">
                    > 시스템 초기화 완료. 가계도 노드 연동 중...
                </div>
            </div>
        </div>

    </main>

    <!-- 하단 푸터 -->
    <footer class="bg-slate-950 border-t border-slate-900 p-4 text-center text-xs text-slate-600">
        얼음과 불의 노래: 웨스테로스 대륙 가문 연동 시뮬레이터 시스템
    </footer>

    <!-- 핵심 데이터 구조 및 이벤트 스크립트 -->
    <script>
        const hierarchyData = {
            // --- 대가문 클래스 데이터 ---
            Stark: {
                type: "대가문", title: "스타크 가문 (House Stark)", motto: "\"겨울이 오고 있다 (Winter Is Coming)\"",
                desc: "수천 년간 북부를 통치한 영주 가문으로, 혹독한 기후를 견디며 대륙 최북단의 장벽을 관리하고 다가올 겨울의 위협을 방비하는 중추적인 역할을 합니다.",
                leader: "에다드 스타크 (Eddard Stark)", leaderDesc: "윈터펠의 영주이자 북부의 관리자. 칠왕국에서 가장 명예를 중시하는 인물로 북부인들의 압도적인 충성을 받습니다."
            },
            Lannister: {
                type: "대가문", title: "라니스터 가문 (House Lannister)", motto: "\"내 포효를 들으라! (Hear Me Roar!)\"",
                desc: "웨스터랜드의 지배자로, 캐스터리 록의 거대한 금광을 소유하여 칠왕국에서 가장 부유합니다. 막강한 자금력으로 왕실 채무를 쥐고 흔들며 권력의 정점에 서 있습니다.",
                leader: "타이윈 라니스터 (Tywin Lannister)", leaderDesc: "서부의 관리자이자 가문의 장장. 냉혹하고 계산이 빠른 최고의 정치 지략가로 가문의 이익을 절대적으로 추구합니다."
            },
            Tully: {
                type: "대가문", title: "툴리 가문 (House Tully)", motto: "\"가족, 의무, 명예 (Family, Duty, Honor)\"",
                desc: "리버랜드의 통치 가문으로 비옥한 삼면강 유역을 관장합니다. 지리적으로 사방이 탁 트여 전란의 중심지가 되기 쉬우며, 외교와 혼인 동맹으로 생존을 도모합니다.",
                leader: "호스터 툴리 (Hoster Tully)", leaderDesc: "리버런의 영주. 가문의 안위를 최우선으로 삼아 스타크, 아린 가문과의 정략결혼을 성사시킨 베테랑 영주입니다."
            },
            Targaryen: {
                type: "왕가 (고대)", title: "타르가르옌 가문 (House Targaryen)", motto: "\"불과 피 (Fire and Blood)\"",
                desc: "고대 발리리아의 후손이자 드래곤을 지배했던 가문. 용의 힘을 빌려 흩어져 있던 웨스테로스의 7왕국을 하나로 묶고 철왕좌 왕조를 개창했던 절대 정복자들입니다.",
                leader: "대너리스 타르가르옌 (Daenerys Targaryen)", leaderDesc: "폭풍의 아이. 가문의 마지막 생존자로, 세 마리의 용을 부화시키며 철왕좌의 정당한 권리를 되찾기 위해 군대를 모으는 정복자입니다."
            },

            // --- 스타크 가문 봉신 가문 데이터 ---
            Mormont: {
                type: "스타크가 봉신", title: "모르몬트 가문 (House Mormont)", motto: "\"우리는 서 있다 (Here We Stand)\"",
                desc: "북부 곰 섬의 영주 가문. 척박한 환경 탓에 풍요롭지는 않으나, 남녀를 가리지 않고 전투에 임하는 강인하고 충직한 전사 가문으로 스타크에 대한 충성심이 매우 깊습니다.",
                leader: "제오르 모르몬트 / 조라 모르몬트", leaderDesc: "과거 영주였던 제오르는 밤의 경비대 총사령관이 되었고, 그의 아들 조라 모르몬트는 불명예로 추방당해 방랑 중입니다."
            },
            Karstark: {
                type: "스타크가 봉신", title: "카스타크 가문 (House Karstark)", motto: "\"겨울의 태양 (The Sun of Winter)\"",
                desc: "카홀드의 영주 가문으로, 수백 년 전 스타크 가문에서 갈라져 나온 방계 혈통입니다. 사실상 친족 가문이기 때문에 강력한 군사력을 바탕으로 북부 전선의 핵심 역할을 맡습니다.",
                leader: "릭카드 카스타크 (Rickard Karstark)", leaderDesc: "카스타크 가문의 영주. 고집스럽고 명예를 중시하며, 가문의 피를 이은 만큼 스타크의 군사 행동에 선봉으로 참여합니다."
            },
            Bolton: {
                type: "스타크가 봉신", title: "볼튼 가문 (House Bolton)", motto: "\"우리 칼날은 날카롭다 (Our Blades Are Sharp)\"",
                desc: "드레드포트의 영주 가문. 과거 북부의 패권을 두고 스타크 가문과 수백 년간 전쟁을 벌였던 숙적이자 현재는 가장 거대하고 위험한 북부의 봉신 가문입니다.",
                leader: "루스 볼튼 (Roose Bolton)", leaderDesc: "드레드포트의 영주. 감정을 전혀 드러내지 않는 싸늘한 인물로, 언제든 이익에 따라 배신할 야심을 숨기고 있습니다."
            },

            // --- 라니스터 가문 봉신 가문 데이터 ---
            Crakehall: {
                type: "라니스터가 봉신", title: "크레이크홀 가문 (House Crakehall)", motto: "\"우리만큼 강한 자는 없다\"",
                desc: "서부 영지의 유서 깊은 봉신으로 가문원 대부분이 덩치가 크고 무력이 뛰어난 기사들을 대거 배출하여 라니스터 군대의 선봉 맷집 역할을 수행합니다.",
                leader: "롤랜드 크레이크홀", leaderDesc: "가문의 핵심 기사이자 장수로, 라니스터 군 작전에서 야전 사령관 역할을 도맡아 합니다."
            },
            Marbrand: {
                type: "라니스터가 봉신", title: "마르브랜드 가문 (House Marbrand)", motto: "\"길을 밝히다\"",
                desc: "애쉬마크의 영주 가문. 타이윈 라니스터의 어머니가 이 가문 출신일 정도로 혈연적으로 가깝고 신뢰도가 높은 서부의 핵심 기사단 세력입니다.",
                leader: "아담 마르브랜드 (Addam Marbrand)", leaderDesc: "서부 최정예 전사이자 대장. 전술적 안목이 뛰어나 타이윈 라니스터가 전초 기사대장으로 크게 신임합니다."
            },
            Clegane: {
                type: "라니스터가 봉신", title: "클레가인 가문 (House Clegane)", motto: "(공식 표어 없음 - 사냥개 세 마리)",
                desc: "타이윈의 아버지를 사냥개로 구한 공로로 영지를 받은 신생 무가(武家) 가문. 오직 라니스터 가문에 대한 맹목적인 무력 충성과 더러운 일 처리를 담당하는 돌격대 세력입니다.",
                leader: "그레고르 클레가인 (Gregor Clegane)", leaderDesc: "'거산(The Mountain)'이라 불리는 거구의 기사. 압도적인 잔혹함과 전투력으로 적들에게 공포를 심어주는 타이윈의 비밀 병기입니다."
            },

            // --- 툴리 가문 봉신 가문 데이터 ---

        function viewDetails(key) {
            const data = hierarchyData[key];
            if (!data) return;

            // 1. 기존 활성화 카드 스타일 해제 및 새 노드 활성화
            document.querySelectorAll('[id^="node-"]').forEach(el => {
                el.classList.remove('active-card');
            });
            const targetNode = document.getElementById(`node-${key}`);
            if (targetNode) targetNode.classList.add('active-card');

            // 2. 우측 모니터에 세력 정보 동적 바인딩
            document.getElementById('monitor-empty').classList.add('hidden');
            const content = document.getElementById('monitor-content');
            content.classList.remove('hidden');

            const typeEl = document.getElementById('m-type');
            typeEl.innerText = data.type;
            
            // 타입별 배지 색상 지정
            if (data.type === "대가문" || data.type === "왕가 (고대)") {
                typeEl.className = "text-[10px] font-bold px-2 py-0.5 rounded uppercase tracking-wide bg-amber-950/80 text-amber-400 border border-amber-800";
            } else if (data.type === "독립 군단") {
                typeEl.className = "text-[10px] font-bold px-2 py-0.5 rounded uppercase tracking-wide bg-slate-800 text-slate-300 border border-slate-600";
            } else {
                typeEl.className = "text-[10px] font-bold px-2 py-0.5 rounded uppercase tracking-wide bg-indigo-950/80 text-indigo-400 border border-indigo-900";
            }

            document.getElementById('m-title').innerText = data.title;
            document.getElementById('m-motto').innerText = data.motto;
            document.getElementById('m-desc').innerText = data.desc;
            document.getElementById('m-leader').innerText = data.leader;
            document.getElementById('m-leader-desc').innerText = data.leaderDesc;

            // 3. 하단 실시간 콘솔 로그 출력
            const consoleLog = document.getElementById('console-log');
            const timestamp = new Date().toLocaleTimeString();
            consoleLog.innerHTML = `> [${timestamp}] 계층 노드 호출 성공: [${data.title}]<br>> 대표 데이터셋 스트리밍 완료.`;
        }
    </script>
