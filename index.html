<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>웨스테로스 대가문 계층도 및 가계도 시뮬레이터</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @keyframes pulse-glow {
            0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(217, 119, 6, 0.7); }
            50% { transform: scale(1.02); box-shadow: 0 0 20px 8px rgba(217, 119, 6, 0.4); }
        }
        .active-card {
            animation: pulse-glow 1.5s infinite ease-in-out;
            background-color: rgb(15, 23, 42) !important;
            border-color: rgb(217, 119, 6) !important;
        }
        /* 가계도 트리 연결선용 스타일 */
        .tree-line::before {
            content: '';
            position: absolute;
            top: -12px;
            left: 50%;
            width: 2px;
            height: 12px;
            background-color: #475569;
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen font-sans flex flex-col justify-between">

    <header class="bg-slate-900 border-b border-slate-800 p-6 text-center shadow-lg">
        <h1 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-amber-400 via-yellow-500 to-orange-500">
            웨스테로스 대륙 세력 및 대가문 계층도
        </h1>
        <p class="text-slate-400 mt-2 text-sm">얼음과 불의 노래 공식 세계관 7왕국 가계도 및 세력 매핑 시스템</p>
    </header>

    <main class="max-w-7xl w-full mx-auto p-6 grid grid-cols-1 lg:grid-cols-4 gap-8 items-start my-auto">
        
        <div class="lg:col-span-3 bg-slate-900/60 border border-slate-800 rounded-2xl p-6 shadow-2xl relative">
            <h2 class="text-xl font-bold mb-8 flex items-center gap-2 text-amber-400">
                <span>👑</span> Westeros Lineage Tree (가문 연동 계층도)
            </h2>
            
            <div class="flex flex-col items-center relative">
                
                <div class="bg-slate-800 border-2 border-slate-600 rounded-xl p-4 w-60 text-center shadow-xl relative z-10">
                    <div class="text-[10px] uppercase font-bold text-slate-400 tracking-wider mb-1">Base Continent</div>
                    <div class="text-xl font-black text-amber-400 font-mono">웨스테로스 대륙</div>
                    <div class="text-[11px] text-slate-400 font-mono mt-1.5 border-t border-slate-700 pt-1">
                        Westeros Authority
                    </div>
                </div>

                <div class="w-0.5 h-8 bg-slate-600 relative"></div>
                
                <div class="w-5/6 border-t-2 border-slate-600 h-6 relative"></div>

                <div class="grid grid-cols-2 md:grid-cols-3 xl:grid-cols-4 gap-x-4 gap-y-8 w-full -mt-6 relative z-10">
                    
                    <button onclick="viewDetails('Stark')" id="card-Stark" 
                        class="tree-line bg-slate-900/50 border border-slate-800 hover:border-amber-600/50 rounded-xl p-3 text-center transition-all duration-300 shadow-md group cursor-pointer focus:outline-none relative">
                        <div class="text-xl mb-1 group-hover:scale-110 transition-transform">🐺</div>
                        <div class="text-xs text-slate-400 font-medium">북부</div>
                        <div class="text-sm font-bold text-slate-200 mt-0.5">스타크 가문</div>
                        <div class="text-[9px] bg-blue-950/60 text-blue-400 border border-blue-900/50 rounded py-0.5 px-1.5 mt-2 inline-block font-mono">Region & House</div>
                    </button>

                    <button onclick="viewDetails('Lannister')" id="card-Lannister" 
                        class="tree-line bg-slate-900/50 border border-slate-800 hover:border-amber-600/50 rounded-xl p-3 text-center transition-all duration-300 shadow-md group cursor-pointer focus:outline-none relative">
                        <div class="text-xl mb-1 group-hover:scale-110 transition-transform">🦁</div>
                        <div class="text-xs text-slate-400 font-medium">서부 영지</div>
                        <div class="text-sm font-bold text-slate-200 mt-0.5">라니스터 가문</div>
                        <div class="text-[9px] bg-amber-950/60 text-amber-400 border border-amber-900/50 rounded py-0.5 px-1.5 mt-2 inline-block font-mono">Region & House</div>
                    </button>

                    <button onclick="viewDetails('Targaryen')" id="card-Targaryen" 
                        class="tree-line bg-slate-900/50 border border-slate-800 hover:border-amber-600/50 rounded-xl p-3 text-center transition-all duration-300 shadow-md group cursor-pointer focus:outline-none relative">
                        <div class="text-xl mb-1 group-hover:scale-110 transition-transform">🐉</div>
                        <div class="text-xs text-slate-400 font-medium">국왕령 / 드래곤스톤</div>
                        <div class="text-sm font-bold text-slate-200 mt-0.5">타르가르옌 가문</div>
                        <div class="text-[9px] bg-red-950/60 text-red-400 border border-red-900/50 rounded py-0.5 px-1.5 mt-2 inline-block font-mono">Region & House</div>
                    </button>

                    <button onclick="viewDetails('Tully')" id="card-Tully" 
                        class="tree-line bg-slate-900/50 border border-slate-800 hover:border-amber-600/50 rounded-xl p-3 text-center transition-all duration-300 shadow-md group cursor-pointer focus:outline-none relative">
                        <div class="text-xl mb-1 group-hover:scale-110 transition-transform">🐟</div>
                        <div class="text-xs text-slate-400 font-medium">리버랜드</div>
                        <div class="text-sm font-bold text-slate-200 mt-0.5">툴리 가문</div>
                        <div class="text-[9px] bg-teal-950/60 text-teal-400 border border-teal-900/50 rounded py-0.5 px-1.5 mt-2 inline-block font-mono">Region & House</div>
                    </button>

                    <button onclick="viewDetails('Baratheon')" id="card-Baratheon" 
                        class="tree-line bg-slate-900/50 border border-slate-800 hover:border-amber-600/50 rounded-xl p-3 text-center transition-all duration-300 shadow-md group cursor-pointer focus:outline-none relative">
                        <div class="text-xl mb-1 group-hover:scale-110 transition-transform">🦌</div>
                        <div class="text-xs text-slate-400 font-medium">폭풍우만</div>
                        <div class="text-sm font-bold text-slate-200 mt-0.5">바라테온 가문</div>
                        <div class="text-[9px] bg-yellow-950/60 text-yellow-400 border border-yellow-900/50 rounded py-0.5 px-1.5 mt-2 inline-block font-mono">Region & House</div>
                    </button>

                    <button onclick="viewDetails('Greyjoy')" id="card-Greyjoy" 
                        class="tree-line bg-slate-900/50 border border-slate-800 hover:border-amber-600/50 rounded-xl p-3 text-center transition-all duration-300 shadow-md group cursor-pointer focus:outline-none relative">
                        <div class="text-xl mb-1 group-hover:scale-110 transition-transform">Squid</div>
                        <div class="text-xs text-slate-400 font-medium">강철 군도</div>
                        <div class="text-sm font-bold text-slate-200 mt-0.5">그레이조이 가문</div>
                        <div class="text-[9px] bg-cyan-950/60 text-cyan-400 border border-cyan-900/50 rounded py-0.5 px-1.5 mt-2 inline-block font-mono">Region & House</div>
                    </button>

                    <button onclick="viewDetails('Martell')" id="card-Martell" 
                        class="tree-line bg-slate-900/50 border border-slate-800 hover:border-amber-600/50 rounded-xl p-3 text-center transition-all duration-300 shadow-md group cursor-pointer focus:outline-none relative">
                        <div class="text-xl mb-1 group-hover:scale-110 transition-transform">☀️</div>
                        <div class="text-xs text-slate-400 font-medium">도르네</div>
                        <div class="text-sm font-bold text-slate-200 mt-0.5">마르텔 가문</div>
                        <div class="text-[9px] bg-orange-950/60 text-orange-400 border border-orange-900/50 rounded py-0.5 px-1.5 mt-2 inline-block font-mono">Region & House</div>
                    </button>

                    <button onclick="viewDetails('Tyrell')" id="card-Tyrell" 
                        class="tree-line bg-slate-900/50 border border-slate-800 hover:border-amber-600/50 rounded-xl p-3 text-center transition-all duration-300 shadow-md group cursor-pointer focus:outline-none relative">
                        <div class="text-xl mb-1 group-hover:scale-110 transition-transform">🌹</div>
                        <div class="text-xs text-slate-400 font-medium">리치 지방</div>
                        <div class="text-sm font-bold text-slate-200 mt-0.5">티렐 가문</div>
                        <div class="text-[9px] bg-green-950/60 text-green-400 border border-green-900/50 rounded py-0.5 px-1.5 mt-2 inline-block font-mono">Region & House</div>
                    </button>

                </div>
            </div>
        </div>

        <div class="bg-slate-900 border border-slate-800 rounded-2xl p-5 shadow-2xl flex flex-col h-[560px]">
            <h2 class="text-lg font-bold mb-3 flex items-center gap-2 text-amber-500">
                <span>⚔️</span> Lineage Info View
            </h2>
            
            <div id="monitor-view" class="bg-slate-950 rounded-xl p-4 flex-1 border border-slate-900 flex flex-col justify-start overflow-y-auto text-left transition-all duration-300">
                <div id="monitor-empty" class="h-full flex flex-col justify-center items-center text-center text-slate-600">
                    <div class="text-4xl mb-2">🛡️</div>
                    <div class="text-sm font-semibold">지역 및 가문 선택</div>
                    <div class="text-xs text-slate-500 mt-1">상속된 봉신 가문 및 영웅 정보가 실시간으로 출력됩니다.</div>
                </div>
                
                <div id="monitor-content" class="hidden space-y-4">
                    <div class="border-b border-slate-800 pb-2.5">
                        <div class="flex items-center gap-1.5">
                            <span id="m-icon" class="text-2xl"></span>
                            <div>
                                <span id="m-region" class="text-[10px] text-amber-500 font-bold block uppercase tracking-wide"></span>
                                <span id="m-house" class="text-base font-extrabold text-slate-100"></span>
                            </div>
                        </div>
                        <p id="m-desc" class="text-xs text-slate-300 mt-2 leading-relaxed bg-slate-900 p-2 rounded border border-slate-800/50"></p>
                        <p id="m-motto" class="text-xs text-yellow-400 font-serif italic mt-1.5 px-1"></p>
                    </div>

                    <div class="bg-slate-900/80 p-3 rounded-lg border border-slate-800/60">
                        <div class="text-[11px] font-bold text-emerald-400 uppercase tracking-wide">👤 가문별 대표 인물</div>
                        <div class="bg-slate-950 p-2 rounded border border-slate-800/80 mt-1.5">
                            <div id="m-char-name" class="text-xs font-bold text-slate-200"></div>
                            <p id="m-char-desc" class="text-[11px] text-slate-400 mt-1 leading-relaxed"></p>
                        </div>
                    </div>

                    <div class="bg-slate-900/80 p-3 rounded-lg border border-slate-800/60">
                        <div class="text-[11px] font-bold text-indigo-400 uppercase tracking-wide">📦 봉신 가문과 대표 인물</div>
                        <div class="bg-slate-950 p-2 rounded border border-slate-800/80 mt-1.5">
                            <div id="m-vassal-title" class="text-xs font-bold text-slate-200"></div>
                            <p id="m-vassal-desc" class="text-[11px] text-slate-400 mt-1 leading-relaxed"></p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="mt-3">
                <div class
